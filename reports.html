<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reports — Hollywood Car Wash</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --yellow: #FFD400; --red: #E10600; --black: #0A0A0A;
    --ink: #141414; --panel: #1A1A1A; --line: #2A2A2A;
    --muted: #888; --white: #F5F5F5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(225,6,0,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(255,212,0,0.06) 0%, transparent 50%);
  }
  .app { max-width: 1100px; margin: 0 auto; padding: 24px 20px 48px; }
  .marquee {
    border: 3px solid var(--yellow);
    padding: 18px 22px;
    margin-bottom: 28px;
    box-shadow: 0 0 0 6px var(--black), 0 0 0 8px var(--red), 6px 6px 0 8px var(--yellow);
    border-radius: 4px;
  }
  .brand {
    text-align: center;
    font-family: 'Bungee', cursive;
    color: var(--yellow);
    font-size: clamp(20px, 4vw, 32px);
    text-shadow: 3px 3px 0 var(--red);
    letter-spacing: 0.04em;
  }
  .sub {
    text-align: center;
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    margin-top: 6px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1 1 240px;
    max-width: 360px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    padding: 9px 36px 9px 34px;
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--yellow); }
  .search-wrap .icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  .search-wrap .clear {
    position: absolute; right: 8px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    background: transparent;
    border: 0;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    display: none;
  }
  .search-wrap .clear:hover { color: var(--yellow); }
  .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .count strong { color: var(--yellow); font-size: 18px; }
  .btn {
    font-family: 'Bungee', cursive;
    padding: 10px 18px;
    font-size: 13px;
    border: 2px solid var(--yellow);
    background: transparent;
    color: var(--yellow);
    cursor: pointer;
    border-radius: 4px;
    text-decoration: none;
    display: inline-block;
    letter-spacing: 0.05em;
  }
  .btn:hover { background: var(--yellow); color: var(--black); }
  .empty {
    background: var(--panel);
    border: 1px dashed var(--line);
    padding: 50px 20px;
    text-align: center;
    border-radius: 6px;
  }
  .empty h3 { font-family: 'Bungee', cursive; color: var(--yellow); margin-bottom: 10px; }
  .empty p { color: var(--muted); font-size: 14px; }
  .reports {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .report-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 18px;
    border-left: 4px solid var(--yellow);
    transition: transform 0.15s, border-color 0.15s;
  }
  .report-card:hover { transform: translateY(-2px); border-left-color: var(--red); }
  .report-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--yellow);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .report-when {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .report-meta {
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .report-meta .row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px dashed var(--line);
  }
  .report-meta .row:last-child { border-bottom: 0; }
  .report-meta .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
  .report-meta .val { color: var(--white); font-weight: 600; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    background: var(--red);
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    border-radius: 2px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .badge.ok { background: var(--yellow); color: var(--black); }
  .files {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding-top: 12px; border-top: 1px solid var(--line);
  }
  .file-link {
    background: var(--black);
    color: var(--yellow);
    padding: 6px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border-radius: 3px;
    text-decoration: none;
    border: 1px solid var(--line);
  }
  .file-link:hover { border-color: var(--yellow); }
  .file-link.pdf { background: var(--red); color: var(--white); border-color: var(--red); }
  .video-block {
    width: 100%;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .video-block video {
    width: 100%;
    max-height: 280px;
    background: #000;
    border-radius: 4px;
    border: 1px solid var(--line);
  }
  .video-block .video-caption {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .video-block .video-caption a {
    color: var(--yellow);
    text-decoration: none;
  }
  .loading {
    text-align: center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    padding: 40px;
  }
  .filmstrip {
    height: 18px;
    border-top: 2px solid var(--yellow);
    border-bottom: 2px solid var(--yellow);
    margin: -8px 0 24px;
    background-image:
      linear-gradient(90deg, var(--black) 0, var(--black) 6px, transparent 6px, transparent 14px),
      linear-gradient(var(--ink) 0, var(--ink) 100%);
    background-size: 14px 100%;
  }
</style>
</head>
<body>
<div class="app">
  <div class="marquee">
    <div class="brand">★ INSPECTION ARCHIVE ★</div>
    <div class="sub">Hollywood Car Wash · Past Reports</div>
  </div>
  <div class="filmstrip"></div>

  <div class="toolbar">
    <div class="count" id="count">Loading...</div>
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input id="search" type="search" inputmode="search" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" placeholder="Search plate, VIN, make/model…" />
      <button class="clear" id="search-clear" type="button" aria-label="Clear search">×</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <span id="user-chip" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);"></span>
      <button class="btn" id="refresh-btn" onclick="load()">↻ Refresh</button>
      <a href="/" class="btn">← New Inspection</a>
    </div>
  </div>

  <div id="container">
    <div class="loading">Loading reports...</div>
  </div>
</div>

<script>
let _allReports = [];

function searchableTokens(r) {
  const meta = r.metadata || {};
  const ext = (meta.analysis && meta.analysis.exterior) || {};
  const plate = ext.license_plate || {};
  const v = ext.vehicle || {};
  return [
    r.id,
    plate.number, plate.state,
    v.vin, v.make, v.model, v.make_model, v.year, v.color, v.body_style,
  ].filter(Boolean).map(s => String(s).toLowerCase()).join(' ');
}

function matchesQuery(r, q) {
  if (!q) return true;
  const needles = q.toLowerCase().split(/\s+/).filter(Boolean);
  const hay = searchableTokens(r);
  return needles.every(n => hay.includes(n));
}

function cardHtml(r) {
  const meta = r.metadata || {};
  const ext = (meta.analysis && meta.analysis.exterior) || {};
  const intA = (meta.analysis && meta.analysis.interior) || {};
  const plate = ext.license_plate || {};
  const vehicle = ext.vehicle || {};
  const modelLine = [vehicle.year, vehicle.model || vehicle.make_model].filter(Boolean).join(' ');
  const damage = (ext.damage || []).length;
  const issues = (intA.issues || []).length;
  const totalFlags = damage + issues;
  const date = new Date(r.createdAt);

  return `
    <div class="report-card">
      <div class="report-id">${escape(r.id)}</div>
      <div class="report-when">${date.toLocaleString()}</div>
      <div class="report-meta">
        <div class="row"><span class="label">VIN</span><span class="val">${escape(vehicle.vin || 'NOT READ')}</span></div>
        <div class="row"><span class="label">Make</span><span class="val">${escape(vehicle.make || '—')}</span></div>
        <div class="row"><span class="label">Model</span><span class="val">${escape(modelLine || '—')}</span></div>
        <div class="row"><span class="label">Color</span><span class="val">${escape(vehicle.color || '—')}</span></div>
        <div class="row"><span class="label">Plate</span><span class="val">${escape(plate.number || 'NOT READ')}${plate.state ? ' / ' + escape(plate.state) : ''}</span></div>
        <div class="row"><span class="label">Findings</span><span class="val">
          ${totalFlags === 0
            ? '<span class="badge ok">CLEAR</span>'
            : '<span class="badge">' + totalFlags + ' flagged</span>'}
        </span></div>
      </div>
      <div class="files">
        ${r.files.filter(f => f.endsWith('.pdf')).map(f =>
          `<a class="file-link pdf" href="/api/reports/${encodeURIComponent(r.id)}/${encodeURIComponent(f)}" target="_blank">📄 ${escape(f)}</a>`
        ).join('')}
        ${r.files.filter(f => !f.endsWith('.pdf')).map(f => {
          const src = `/api/reports/${encodeURIComponent(r.id)}/${encodeURIComponent(f)}`;
          const type = f.endsWith('.mp4') ? 'video/mp4' : f.endsWith('.webm') ? 'video/webm' : '';
          return `
            <div class="video-block">
              <video controls playsinline preload="metadata">
                <source src="${src}" ${type ? `type="${type}"` : ''} />
                Your browser can't play this video.
              </video>
              <div class="video-caption">
                <span>🎬 ${escape(f)}</span>
                <a href="${src}" target="_blank" rel="noopener">open ↗</a>
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderReports(query) {
  const container = document.getElementById('container');
  const countEl   = document.getElementById('count');
  const q = (query || '').trim();
  const total = _allReports.length;

  if (!total) {
    countEl.innerHTML = '';
    container.innerHTML = `
      <div class="empty">
        <h3>NO REPORTS YET</h3>
        <p>Reports saved from the inspection app will show up here.</p>
      </div>`;
    return;
  }

  const filtered = q ? _allReports.filter(r => matchesQuery(r, q)) : _allReports;
  countEl.innerHTML = q
    ? `<strong>${filtered.length}</strong> of ${total} match "${escape(q)}"`
    : `<strong>${total}</strong> reports on file`;

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty">
        <h3>NO MATCHES</h3>
        <p>No reports match <strong>${escape(q)}</strong>. Try a partial plate, VIN, or make.</p>
      </div>`;
    return;
  }

  container.innerHTML = '<div class="reports">' + filtered.map(cardHtml).join('') + '</div>';
}

function readQueryFromUrl() {
  try {
    const p = new URLSearchParams(location.search);
    return p.get('q') || '';
  } catch { return ''; }
}

function writeQueryToUrl(q) {
  try {
    const url = new URL(location.href);
    if (q) url.searchParams.set('q', q);
    else url.searchParams.delete('q');
    history.replaceState(null, '', url);
  } catch {}
}

function wireSearch() {
  const input = document.getElementById('search');
  const clear = document.getElementById('search-clear');
  if (!input) return;
  const apply = () => {
    const q = input.value;
    clear.style.display = q ? 'block' : 'none';
    renderReports(q);
    writeQueryToUrl(q);
  };
  input.addEventListener('input', apply);
  clear.addEventListener('click', () => { input.value = ''; apply(); input.focus(); });
  const initial = readQueryFromUrl();
  if (initial) { input.value = initial; clear.style.display = 'block'; }
}

async function load() {
  const container = document.getElementById('container');
  const countEl = document.getElementById('count');
  const userChip = document.getElementById('user-chip');
  try {
    const me = await fetch('/api/auth/me', { credentials: 'same-origin' });
    if (me.ok) {
      const j = await me.json();
      userChip.textContent = 'Signed in as ' + j.username;
    } else {
      userChip.textContent = '';
    }
    const r = await fetch('/api/reports', { credentials: 'same-origin' });
    if (r.status === 401) {
      countEl.innerHTML = '';
      container.innerHTML = `
        <div class="empty">
          <h3>SIGN IN REQUIRED</h3>
          <p>You need to sign in before you can view your reports.</p>
          <p style="margin-top:16px;"><a class="btn" href="/">← Go sign in</a></p>
        </div>`;
      return;
    }
    const data = await r.json();
    _allReports = data.reports || [];
    renderReports(document.getElementById('search')?.value || '');
  } catch (e) {
    container.innerHTML = `<div class="empty"><h3>ERROR</h3><p>${escape(e.message)}</p></div>`;
  }
}

function escape(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

wireSearch();
load();
</script>
</body>
</html>
